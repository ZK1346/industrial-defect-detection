project:
  name: "CV Assignment 03 - ResNet-style PatchCore baseline"
  output_dir: "outputs"

cases:
  case2:
    title: "Case 2 - round cap inspection"
    video: "data/case2.mp4"  # TODO: Update with your video path
    train_range_sec: [0, 120]
